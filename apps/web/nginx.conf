server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /health {
    proxy_pass http://api:8000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # Knife4j 开发文档（/doc.html）
  location = /doc.html {
    proxy_pass http://api:8000/doc.html;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
  location /webjars/ {
    proxy_pass http://api:8000/webjars/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
  location /img/ {
    proxy_pass http://api:8000/img/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
  location /v3/ {
    proxy_pass http://api:8000/v3/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
  location = /openapi.json {
    proxy_pass http://api:8000/openapi.json;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
  location = /docs {
    return 302 /doc.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
