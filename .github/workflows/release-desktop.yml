# 按 tag 发布桌面端（Windows / macOS / Linux）
#
# 触发：推送 v* tag，例如：
#   git tag v0.1.0 && git push origin v0.1.0
#
# 产物：统一挂到同一个 GitHub Release（供 electron-updater 升级）
#
# 注意：
# 1. 矩阵任务只构建（--publish never），避免并行 publish 竞态拆成多个 Release
# 2. 全部构建成功后，由 publish job 一次性上传到该 tag 的 Release
# 3. macOS 正式公证需配置 Apple 证书；当前关闭自动签名探测以便 CI 能出包
# 4. 各平台先 PyInstaller 打 API sidecar，再 electron-builder 打进安装包

name: Release Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: desktop-windows
            electron_args: --win --x64
          - os: macos-latest
            artifact: desktop-macos
            electron_args: --mac --x64 --arm64
          - os: ubuntu-22.04
            artifact: desktop-linux
            electron_args: --linux --x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Build web (Electron)
        working-directory: apps/web
        env:
          ELECTRON: "1"
        run: npm run build

      - name: Install API deps
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build API sidecar
        working-directory: apps/api
        run: python scripts/build_sidecar.py

      - name: Install desktop deps
        working-directory: apps/desktop
        run: npm install

      - name: Sync version from tag
        shell: bash
        working-directory: apps/desktop
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Build Electron (no publish)
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder ${{ matrix.electron_args }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: |
          echo "Files to attach:"
          find dist -type f -printf '%p\t%s\n' | sort
          # 粗检：必须有各平台主安装包，避免只挂上 blockmap
          test -n "$(find dist -name 'Kongku-*-win-*.exe' | head -n1)"
          test -n "$(find dist -name 'Kongku-*-mac-*.dmg' | head -n1)"
          test -n "$(find dist -name 'Kongku-*-linux-*.AppImage' | head -n1)"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
